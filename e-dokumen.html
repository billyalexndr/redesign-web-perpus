<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="style.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        />

        <title>Website Perpustakaan</title>
    </head>

    <body>
        <!-- NAVBAR -->
        <div id="navbar"></div>

        <!-- BANNER -->
        <div
            class="banner d-flex justify-content-center align-items-center text-center"
        >
            <div class="container">
                <h1 class="display-5 fw-bold text-white">E-DOKUMEN</h1>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="container my-5">
            <!-- CATEGORY -->
            <div class="d-flex flex-wrap gap-2 mb-3">
                <button
                    class="btn btn-dark btn-edok active"
                    data-kategori="internal"
                >
                    E-Dokumen Internal
                </button>

                <button
                    class="btn btn-outline-dark btn-edok"
                    data-kategori="eksternal"
                >
                    E-Dokumen Eksternal
                </button>
            </div>

            <!-- TABLE -->
            <div id="dokumenTable"></div>
        </div>

        <!-- FOOTER -->
        <div id="footer"></div>

        <script src="script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
