<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <title>Website Perpustakaan</title>
    </head>

    <body>
        <body>
            <div id="navbar"></div>
            <div class="banner-home d-flex align-items-center">
                <div class="w-100 px-4">
                    <div class="mx-auto" style="max-width: 650px">
                        <!-- Buttons -->
                        <div class="d-flex gap-0 flex-wrap mb-3">
                            <button class="btn btn-primary">Pencarian</button>
                            <button class="btn btn-primary">Library</button>
                            <button class="btn btn-primary">Repository</button>
                            <button class="btn btn-primary">E-Journal</button>
                        </div>

                        <!-- Search -->
                        <div class="input-group">
                            <input
                                type="text"
                                class="form-control"
                                placeholder="Masukkan kata kunci pencarian buku, repository, e-journal, dan lainnya"
                            />
                            <button class="btn btn-dark">Search</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="informasi"></div>
            <div id="berita"></div>
            <div id="faq"></div>
            <div id="video"></div>
            <div id="footer"></div>

            <script src="script.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        </body>
    </body>
</html>
