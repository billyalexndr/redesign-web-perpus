<div class="container my-5">
    <div class="row">
        <!-- LEFT -->
        <div class="col-lg-4 mb-4">
            <h5 class="fw-bold mb-3">Berita Terbaru</h5>

            <div class="card">
                <img src="image/tester.png" class="card-img-top" />
                <div class="card-body">
                    <h6 class="fw-bold">Judul Berita Utama</h6>
                    <small class="text-muted">Maret 2026</small>
                </div>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="col-lg-8">
            <!-- CATEGORY -->
            <div class="d-flex flex-wrap gap-2 mb-4">
                <button
                    class="btn btn-dark btn-sm btn-category active"
                    data-category="all"
                >
                    All
                </button>
                <button
                    class="btn btn-outline-dark btn-sm btn-category"
                    data-category="buku"
                >
                    Artikel Buku
                </button>
                <button
                    class="btn btn-outline-dark btn-sm btn-category"
                    data-category="berita"
                >
                    Berita
                </button>
                <button
                    class="btn btn-outline-dark btn-sm btn-category"
                    data-category="peringatan"
                >
                    Hari Peringatan
                </button>
                <button
                    class="btn btn-outline-dark btn-sm btn-category"
                    data-category="pengumuman"
                >
                    Pengumuman
                </button>
            </div>

            <!-- NEWS -->
            <div class="d-flex flex-column gap-3">
                <!-- NEW -->
                <div class="d-flex gap-3 news-item" data-category="pengumuman">
                    <img
                        src="https://via.placeholder.com/120x90"
                        class="rounded"
                    />
                    <div>
                        <h6 class="fw-bold mb-1">Berita Kampus Terbaru</h6>
                        <small class="text-muted">Maret 2026</small>
                    </div>
                </div>

                <div class="d-flex gap-3 news-item" data-category="buku">
                    <img
                        src="https://via.placeholder.com/120x90"
                        class="rounded"
                    />
                    <div>
                        <h6 class="fw-bold mb-1">Rekomendasi Buku</h6>
                        <small class="text-muted">Februari 2026</small>
                    </div>
                </div>

                <div class="d-flex gap-3 news-item" data-category="pengumuman">
                    <img
                        src="https://via.placeholder.com/120x90"
                        class="rounded"
                    />
                    <div>
                        <h6 class="fw-bold mb-1">Pengumuman Libur</h6>
                        <small class="text-muted">Januari 2026</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
